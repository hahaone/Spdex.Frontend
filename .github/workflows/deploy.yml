name: Build & Deploy Frontend

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        type: boolean
        default: true
      image_distribution:
        description: 'Web 镜像分发方式'
        type: choice
        options:
          - archive
          - pull
        default: archive

env:
  ACR_REGISTRY: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com
  IMAGE_FJC: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com/spdex/spdex.frontend
  IMAGE_2026: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com/spdex/spdex.frontend.2026
  IMAGE_NEWSPDEX: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com/spdex/spdex.frontend.newspdex
  IMAGE_QUANTILEARN: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com/spdex/spdex.frontend.quantilearn
  IMAGE_ADMIN: crpi-z3csgr9um1cm0oj6.cn-qingdao.personal.cr.aliyuncs.com/spdex/spdex.frontend.admin

jobs:
  changes:
    name: Detect changed frontends
    # push 时需要 commit message 含 [build] 或 [deploy]；手动触发时直接运行
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (contains(github.event.head_commit.message, '[build]') || contains(github.event.head_commit.message, '[deploy]')))
    runs-on: ubuntu-latest
    outputs:
      fjc: ${{ steps.detect.outputs.fjc }}
      frontend2026: ${{ steps.detect.outputs.frontend2026 }}
      newspdex: ${{ steps.detect.outputs.newspdex }}
      quantilearn: ${{ steps.detect.outputs.quantilearn }}
      admin: ${{ steps.detect.outputs.admin }}
      any: ${{ steps.detect.outputs.any }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed frontend projects
        id: detect
        shell: bash
        env:
          IS_DEPLOY_RELEASE: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]') }}
        run: |
          set -euo pipefail

          fjc=false
          frontend2026=false
          newspdex=false
          quantilearn=false
          admin=false

          if [ "$IS_DEPLOY_RELEASE" = "true" ]; then
            # 部署发布使用同一个 Git SHA 作为所有前端镜像 tag，因此必须全量构建。
            fjc=true
            frontend2026=true
            newspdex=true
            quantilearn=true
            admin=true
          else
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t files < <(git diff-tree --no-commit-id --name-only -r "$after")
            else
              mapfile -t files < <(git diff --name-only "$before" "$after")
            fi

            if [ "${#files[@]}" -eq 0 ]; then
              mapfile -t files < <(git show --pretty='' --name-only "$after")
            fi

            printf 'Changed files:\n'
            printf '  %s\n' "${files[@]}"

            for file in "${files[@]}"; do
              case "$file" in
                Spdex.Frontend.Fjc/*)
                  fjc=true
                  ;;
                Spdex.Frontend.2026/*)
                  frontend2026=true
                  ;;
                Spdex.Frontend.NewSpdex/*)
                  newspdex=true
                  ;;
                Spdex.Frontend.Quantilearn/*)
                  quantilearn=true
                  ;;
                Spdex.Frontend.Admin/*)
                  admin=true
                  ;;
                .github/workflows/deploy.yml)
                  # 部署流水线自身变化影响所有服务，构建一次全量镜像验证新流程。
                  fjc=true
                  frontend2026=true
                  newspdex=true
                  quantilearn=true
                  admin=true
                  ;;
              esac
            done
          fi

          any=false
          if [ "$fjc" = "true" ] || [ "$frontend2026" = "true" ] || [ "$newspdex" = "true" ] || [ "$quantilearn" = "true" ] || [ "$admin" = "true" ]; then
            any=true
          fi

          {
            echo "fjc=$fjc"
            echo "frontend2026=$frontend2026"
            echo "newspdex=$newspdex"
            echo "quantilearn=$quantilearn"
            echo "admin=$admin"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Frontend change detection"
            echo "- FJCX: $fjc"
            echo "- 2026: $frontend2026"
            echo "- NewSpdex: $newspdex"
            echo "- Quantilearn: $quantilearn"
            echo "- Admin: $admin"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build changed frontend images
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push FJCX Docker image
        if: needs.changes.outputs.fjc == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Spdex.Frontend.Fjc
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.IMAGE_FJC }}:latest
            ${{ env.IMAGE_FJC }}:${{ github.sha }}

      - name: Build and push 2026 Docker image
        if: needs.changes.outputs.frontend2026 == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Spdex.Frontend.2026
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.IMAGE_2026 }}:latest
            ${{ env.IMAGE_2026 }}:${{ github.sha }}

      - name: Build and push NewSpdex Docker image
        if: needs.changes.outputs.newspdex == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Spdex.Frontend.NewSpdex
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          tags: |
            ${{ env.IMAGE_NEWSPDEX }}:latest
            ${{ env.IMAGE_NEWSPDEX }}:${{ github.sha }}

      - name: Build and push Quantilearn Docker image
        if: needs.changes.outputs.quantilearn == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Spdex.Frontend.Quantilearn
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            API_INTERNAL_URL=http://127.0.0.1:5015
          tags: |
            ${{ env.IMAGE_QUANTILEARN }}:latest
            ${{ env.IMAGE_QUANTILEARN }}:${{ github.sha }}

      - name: Build and push Admin Docker image
        if: needs.changes.outputs.admin == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./Spdex.Frontend.Admin
          push: true
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            API_INTERNAL_URL=http://127.0.0.1:5000
          tags: |
            ${{ env.IMAGE_ADMIN }}:latest
            ${{ env.IMAGE_ADMIN }}:${{ github.sha }}

  deploy:
    name: Deploy frontend release to Web nodes
    needs: [changes, build]
    # push 含 [deploy] 时自动部署；手动触发时根据 deploy 参数决定
    if: >-
      needs.changes.outputs.any == 'true' &&
      ((github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare Ansible inventory and runtime vars
        working-directory: deploy/web/ansible
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          WEB_DEPLOY_SSH_KEY: ${{ secrets.WEB_DEPLOY_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
          WEB_ANSIBLE_INVENTORY: ${{ secrets.WEB_ANSIBLE_INVENTORY }}
          WEB_ANSIBLE_GROUP_VARS_ALL: ${{ secrets.WEB_ANSIBLE_GROUP_VARS_ALL }}
          WEB_ANSIBLE_GROUP_VARS_WEB_NODES: ${{ secrets.WEB_ANSIBLE_GROUP_VARS_WEB_NODES }}
          SPDEX_BACKEND_PRIVATE_BASE_URL: ${{ secrets.SPDEX_BACKEND_PRIVATE_BASE_URL || vars.SPDEX_BACKEND_PRIVATE_BASE_URL || 'http://10.28.23.149:5000' }}
          QUANTILEARN_PRIVATE_BASE_URL: ${{ secrets.QUANTILEARN_PRIVATE_BASE_URL || vars.QUANTILEARN_PRIVATE_BASE_URL || 'http://10.28.23.149:5015' }}
          SPDEX_API_KEY: ${{ secrets.SPDEX_API_KEY }}
          QUANTILEARN_AUTH_SHARED_SECRET: ${{ secrets.QUANTILEARN_AUTH_SHARED_SECRET }}
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh" inventory group_vars
          chmod 700 "$HOME/.ssh"

          if [ -z "${WEB_DEPLOY_SSH_KEY:-}" ]; then
            echo "Missing WEB_DEPLOY_SSH_KEY or DEPLOY_SSH_KEY secret."
            exit 1
          fi
          printf '%s\n' "$WEB_DEPLOY_SSH_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

          cat > "$HOME/.ssh/config" <<'EOF'
          Host spdex-jump 139.129.208.138
            HostName 139.129.208.138
            User root
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null

          Host 10.111.*
            User root
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ssh spdex-jump "bash -c 'exec 3<>/dev/tcp/%h/%p; cat <&3 & cat >&3; wait'"
          EOF
          chmod 600 "$HOME/.ssh/config"

          if [ -n "${WEB_ANSIBLE_INVENTORY:-}" ]; then
            printf '%s\n' "$WEB_ANSIBLE_INVENTORY" > inventory/production.ini
          else
            cp inventory/production.ini.example inventory/production.ini
          fi

          if [ -n "${WEB_ANSIBLE_GROUP_VARS_ALL:-}" ]; then
            printf '%s\n' "$WEB_ANSIBLE_GROUP_VARS_ALL" > group_vars/all.yml
          else
            cp group_vars/all.yml.example group_vars/all.yml
          fi

          if [ -n "${WEB_ANSIBLE_GROUP_VARS_WEB_NODES:-}" ]; then
            printf '%s\n' "$WEB_ANSIBLE_GROUP_VARS_WEB_NODES" > group_vars/web_nodes.yml
          else
            cp group_vars/web_nodes.yml.example group_vars/web_nodes.yml
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          data = {
              "web_acr_registry": os.environ["ACR_REGISTRY"],
              "web_acr_username": os.environ.get("ACR_USERNAME", ""),
              "web_acr_password": os.environ.get("ACR_PASSWORD", ""),
              "web_image_tag": os.environ["GITHUB_SHA"],
              "web_image_fjc": os.environ["IMAGE_FJC"],
              "web_image_2026": os.environ["IMAGE_2026"],
              "web_image_newspdex": os.environ["IMAGE_NEWSPDEX"],
              "web_image_quantilearn": os.environ["IMAGE_QUANTILEARN"],
              "web_image_admin": os.environ["IMAGE_ADMIN"],
              "web_image_refs": [
                  f"{os.environ['IMAGE_FJC']}:{os.environ['GITHUB_SHA']}",
                  f"{os.environ['IMAGE_2026']}:{os.environ['GITHUB_SHA']}",
                  f"{os.environ['IMAGE_NEWSPDEX']}:{os.environ['GITHUB_SHA']}",
                  f"{os.environ['IMAGE_QUANTILEARN']}:{os.environ['GITHUB_SHA']}",
                  f"{os.environ['IMAGE_ADMIN']}:{os.environ['GITHUB_SHA']}",
              ],
              "web_image_archive_local": f"/tmp/spdex-web-images-{os.environ['GITHUB_SHA']}.tar.gz",
              "web_image_archive_remote": f"/tmp/spdex-web-images-{os.environ['GITHUB_SHA']}.tar.gz",
              "spdex_api_internal_url": os.environ["SPDEX_BACKEND_PRIVATE_BASE_URL"],
              "quantilearn_api_internal_url": os.environ["QUANTILEARN_PRIVATE_BASE_URL"],
              "spdex_api_key": os.environ.get("SPDEX_API_KEY", ""),
              "quantilearn_auth_shared_secret": os.environ.get("QUANTILEARN_AUTH_SHARED_SECRET", ""),
          }
          Path("group_vars/runtime.auto.json").write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Sync Web images through source host
        if: ${{ (github.event.inputs.image_distribution || vars.WEB_IMAGE_DISTRIBUTION || 'archive') == 'archive' }}
        working-directory: deploy/web/ansible
        run: |
          set -euo pipefail
          ansible-playbook \
            -i inventory/production.ini \
            playbooks/sync-images-from-source.yml \
            --extra-vars @group_vars/all.yml \
            --extra-vars @group_vars/web_nodes.yml \
            --extra-vars @group_vars/runtime.auto.json

      - name: Deploy Web nodes
        working-directory: deploy/web/ansible
        env:
          WEB_IMAGE_DISTRIBUTION: ${{ github.event.inputs.image_distribution || vars.WEB_IMAGE_DISTRIBUTION || 'archive' }}
        run: |
          set -euo pipefail

          deploy_distribution="$WEB_IMAGE_DISTRIBUTION"
          if [ "$deploy_distribution" = "archive" ]; then
            deploy_distribution="skip"
          fi

          ansible-playbook \
            -i inventory/production.ini \
            playbooks/web-node.yml \
            --extra-vars @group_vars/all.yml \
            --extra-vars @group_vars/web_nodes.yml \
            --extra-vars @group_vars/runtime.auto.json \
            --extra-vars "web_image_distribution=${deploy_distribution}"

      - name: Verify Web nodes
        working-directory: deploy/web/ansible
        run: |
          set -euo pipefail
          ansible-playbook \
            -i inventory/production.ini \
            playbooks/verify-web-node.yml \
            --extra-vars @group_vars/all.yml \
            --extra-vars @group_vars/web_nodes.yml \
            --extra-vars @group_vars/runtime.auto.json

      - name: Verify public ALB routes
        run: |
          set -euo pipefail

          check_any() {
            url="$1"
            shift
            code="$(curl -k -sS -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo 000)"
            for expected in "$@"; do
              if [ "$code" = "$expected" ]; then
                echo "$url -> $code"
                return 0
              fi
            done
            echo "$url -> unexpected HTTP $code; expected one of: $*"
            exit 1
          }

          check_any https://new.spdex.com/login 200
          check_any https://2026.spdex.com/login 200
          check_any https://fjcx.spdex.com/ 200 302
          check_any https://ql.spdex.com/ 200 302
          check_any https://admin2026.spdex.com/login 200 302 403
          check_any http://new.spdex.com/login 301 302
